<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tbtparent.me - 页面已更新</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e5e5e5;
      --muted: #737373;
      --border: #262626;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --fg: #171717;
        --muted: #737373;
        --border: #e5e5e5;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .code {
      font-size: 4rem;
      font-weight: bold;
      letter-spacing: 4px;
      color: var(--fg);
      margin-bottom: 8px;
    }

    .message {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: var(--border);
      margin: 0 auto 40px;
    }

    .nav-title {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 40px;
    }

    .nav-item {
      display: block;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--fg);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .nav-item:hover {
      border-color: var(--fg);
    }

    .nav-item .label {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .nav-item .desc {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .home-link {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .home-link:hover {
      color: var(--fg);
      border-color: var(--fg);
    }

    .redirect-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 32px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="message">
      该页面已不存在，网站内容已更新重组。<br />
      请从下方导航前往对应页面。
    </div>

    <div class="divider"></div>

    <div class="nav-title">快速导航</div>
    <div class="nav-grid">
      <a href="https://tbtparent.me/blog" class="nav-item">
        <div class="label">博客</div>
        <div class="desc">技术文章与笔记</div>
      </a>
      <a href="https://tbtparent.me/projects" class="nav-item">
        <div class="label">项目</div>
        <div class="desc">作品与开源项目</div>
      </a>
      <a href="https://tbtparent.me/tools" class="nav-item">
        <div class="label">工具</div>
        <div class="desc">在线实用工具</div>
      </a>
      <a href="https://tbtparent.me/game" class="nav-item">
        <div class="label">小游戏</div>
        <div class="desc">成语闯关</div>
      </a>
    </div>

    <a href="https://tbtparent.me" class="home-link">返回首页</a>

    <div class="redirect-hint" id="redirectHint"></div>
  </div>

  <script>
    // 5秒后自动跳转到首页
    let countdown = 5;
    const hint = document.getElementById('redirectHint');
    hint.textContent = `${countdown} 秒后自动跳转到首页`;
    const timer = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(timer);
        window.location.href = 'https://tbtparent.me';
      } else {
        hint.textContent = `${countdown} 秒后自动跳转到首页`;
      }
    }, 1000);
  </script>
</body>
</html>
