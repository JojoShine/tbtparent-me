# tbtparent.me - Nginx 配置
# 放置路径: /etc/nginx/conf.d/tbtparent.me.conf
# 使用前请修改 server_name 和 SSL 证书路径

# 上游 Next.js 服务
upstream nextjs_app {
    server 127.0.0.1:5001;
    keepalive 64;
}

# HTTP -> HTTPS 重定向（如果不需要 SSL 可删除此段）
server {
    listen 80;
    server_name tbtparent.me www.tbtparent.me;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置（如果不需要 SSL，将 listen 443 改为 listen 80，并删除 ssl 相关行）
server {
    listen 443 ssl http2;
    server_name tbtparent.me www.tbtparent.me;

    # SSL 证书（按需修改路径，或使用 Let's Encrypt）
    ssl_certificate     /etc/nginx/ssl/tbtparent.me.crt;
    ssl_certificate_key /etc/nginx/ssl/tbtparent.me.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml;

    # Next.js 静态资源缓存（/_next/static/ 带 hash，可长期缓存）
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # public 静态资源
    location /assets/ {
        proxy_pass http://nextjs_app;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API 路由 - 不缓存
    location /api/ {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 所有其他请求代理到 Next.js
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
